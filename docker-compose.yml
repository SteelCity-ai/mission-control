services:
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mission-control
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - OPENCLAW_DIR=/openclaw
      # Auth secrets - use Docker secrets or env files in production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:18789
    volumes:
      # Mount OpenClaw directory for read access
      - /docker/openclaw-cnvy/data/.openclaw:/openclaw:ro
      # Mount npm global for built-in skills
      - /docker/openclaw-cnvy/data/.npm-global:/data/.npm-global:ro
      # Persist data files ( SQLite, JSON, etc. )
      - mission-control-data:/app/data
      # Tailscale socket for real VPN data
      - /var/run/tailscale:/var/run/tailscale:ro
      # Docker socket for container stats
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    # Connect to OpenClaw's network if it exists
    networks:
      - openclaw-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  mission-control-data:
    driver: local

networks:
  openclaw-network:
    external: true
    name: openclaw-cnvy